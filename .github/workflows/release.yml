name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: |
          npm run package >> package_output.txt
          grep "RELEASE_PACKAGE_NAME=" package_output.txt >> $GITHUB_ENV
          cat package_output.txt

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/${{ env.RELEASE_PACKAGE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
