<!DOCTYPE html>
<html class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/welcome.css" />
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen transition-colors">
  <div class="container">

    <!-- Top-right controls: Language + Theme toggle -->
    <div class="top-controls">
      <button id="lang_toggle" class="btn-control">한국어</button>
      <button id="theme_toggle" class="btn-control" title="Toggle theme">
        <span id="theme_icon_light" class="hidden">&#9728;</span>
        <span id="theme_icon_dark" class="hidden">&#9790;</span>
      </button>
    </div>

    <!-- Logo / Title -->
    <div class="text-center mb-12">
      <h1 class="logo-font">
        Bae<span class="text-brand">/&lt;</span>joonHub<span class="text-brand">></span>
      </h1>
      <p class="subtitle" data-i18n="welcome.subtitle">Automatically sync your code from Baekjoon to GitHub</p>
    </div>

    <!-- Error message -->
    <div hidden id="error" class="msg msg-error"></div>

    <!-- Success message -->
    <div hidden id="success" class="msg msg-success"></div>

    <!-- Unlink -->
    <p hidden id="unlink" class="unlink-area">
      <span data-i18n="welcome.unlinkText">Linked the wrong repo?</span>
      <a class="link-brand" data-i18n="welcome.unlinkAction">Unlink</a>.
    </p>

    <!-- Hook Mode: Setup form -->
    <div id="hook_mode" class="hidden">
      <div class="card">
        <h2 class="card-title" data-i18n="welcome.getStarted.title">To get started with BaekjoonHub</h2>

        <div class="form-stack">
          <!-- Option select -->
          <select id="type" class="form-input">
            <option value="" data-i18n="welcome.pickOption">Pick an Option</option>
            <option value="new" data-i18n="welcome.createRepo">Create a new Private Repository</option>
            <option value="link" data-i18n="welcome.linkRepo">Link an Existing Repository</option>
          </select>

          <!-- Organize option -->
          <select id="org_option" class="form-input">
            <option value="platform" data-i18n="welcome.organizeByPlatform">Organize by Platform</option>
            <option value="language" data-i18n="welcome.organizeByLanguage">Organize by Language</option>
          </select>

          <!-- Repository name -->
          <input autocomplete="off" id="name" class="form-input"
            placeholder="Repository Name" data-i18n-placeholder="welcome.repoNamePlaceholder" type="text" />
        </div>

        <!-- Get Started button -->
        <div class="text-right mt-6">
          <button id="hook_button" disabled class="btn-primary"
            data-i18n="welcome.getStartedBtn">Get Started</button>
        </div>
      </div>
    </div>

    <!-- Commit Mode: Connected state -->
    <div id="commit_mode" class="hidden">
      <div class="text-center space-y-6">
        <button id="token_refresh_button" class="btn-primary"
          data-i18n="welcome.refreshToken">Refresh GitHub Token</button>

        <p hidden id="token_status" class="token-status"></p>

        <div>
          <label class="checkbox-label">
            <input type="checkbox" id="examplesBox" />
            <span data-i18n="welcome.saveExamples">Save example I/O</span>
          </label>
        </div>

        <div class="muted-text">
          <p class="text-lg font-semibold" data-i18n="welcome.wantMore">Want more features?</p>
          <a class="link-brand text-sm" target="_blank"
            href="https://github.com/BaekjoonHub/BaekjoonHub/issues"
            data-i18n="welcome.requestFeature">Request a feature!</a>
        </div>
      </div>
    </div>

    <!-- GitHub Star link -->
    <div class="footer-link">
      <a class="link-muted" target="_blank"
        href="https://github.com/BaekjoonHub/BaekjoonHub"
        data-i18n-html="welcome.starOnGithub">Star
        <span>Baekjoon</span><span class="text-brand">Hub</span> on GitHub</a>
    </div>

  </div>

  <script src="scripts/i18n.js"></script>
  <script type="text/javascript" src="welcome.js"></script>
</body>
</html>
